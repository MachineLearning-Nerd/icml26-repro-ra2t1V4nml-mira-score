<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-labelledby="title desc">
  <title id="title">Claim 5 posterior diagnostic comparison</title>
  <desc id="desc">HMC and affine sampler maximum split R-hat values by model, plus adaptive importance effective sample sizes. Every approach fails at least one predeclared evidence gate.</desc>
  <rect width="1180" height="700" fill="#fbfaf7"/>
  <text x="58" y="54" font-family="sans-serif" font-size="28" font-weight="700" fill="#18212b">Three posterior approaches; none clears every gate</text>
  <text x="58" y="84" font-family="sans-serif" font-size="16" fill="#52606d">Lower R̂ is better (gate ≤ 1.20). Higher importance ESS is better (gate ≥ 1,000 of 20,000).</text>
  <text x="58" y="132" font-family="sans-serif" font-size="20" font-weight="700" fill="#18212b">A. Maximum split-R̂</text>
  <line x1="250" y1="156" x2="250" y2="456" stroke="#9aa5b1"/>
  <line x1="250" y1="456" x2="1110" y2="456" stroke="#9aa5b1"/>
  <line x1="250" y1="434" x2="1110" y2="434" stroke="#2f855a" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="1115" y="439" font-family="sans-serif" font-size="13" fill="#2f855a">1.20 gate</text>
  <text x="60" y="187" font-family="sans-serif" font-size="15" fill="#273444">HMC · EPL+3</text><rect x="250" y="170" width="6" height="20" fill="#dd6b20"/><text x="264" y="186" font-family="sans-serif" font-size="14" fill="#273444">1.19 ✓</text>
  <text x="60" y="220" font-family="sans-serif" font-size="15" fill="#273444">HMC · SIE+3</text><rect x="250" y="203" width="744" height="20" fill="#c53030"/><text x="1002" y="219" font-family="sans-serif" font-size="14" fill="#273444">185.97</text>
  <text x="60" y="253" font-family="sans-serif" font-size="15" fill="#273444">HMC · EPL+1</text><rect x="250" y="236" width="302" height="20" fill="#c53030"/><text x="560" y="252" font-family="sans-serif" font-size="14" fill="#273444">75.59</text>
  <text x="60" y="286" font-family="sans-serif" font-size="15" fill="#273444">HMC · SIE+1</text><rect x="250" y="269" width="776" height="20" fill="#c53030"/><text x="1034" y="285" font-family="sans-serif" font-size="14" fill="#273444">193.97</text>
  <text x="60" y="334" font-family="sans-serif" font-size="15" fill="#273444">Affine-long · EPL+3</text><rect x="250" y="317" width="64" height="20" fill="#dd6b20"/><text x="322" y="333" font-family="sans-serif" font-size="14" fill="#273444">1.587</text>
  <text x="60" y="367" font-family="sans-serif" font-size="15" fill="#273444">Affine-long · SIE+3</text><rect x="250" y="350" width="118" height="20" fill="#c53030"/><text x="376" y="366" font-family="sans-serif" font-size="14" fill="#273444">2.941</text>
  <text x="60" y="400" font-family="sans-serif" font-size="15" fill="#273444">Affine-long · EPL+1</text><rect x="250" y="383" width="42" height="20" fill="#2f855a"/><text x="300" y="399" font-family="sans-serif" font-size="14" fill="#273444">1.039 ✓</text>
  <text x="60" y="433" font-family="sans-serif" font-size="15" fill="#273444">Affine-long · SIE+1</text><rect x="250" y="416" width="41" height="20" fill="#2f855a"/><text x="299" y="432" font-family="sans-serif" font-size="14" fill="#273444">1.035 ✓</text>
  <text x="250" y="480" font-family="sans-serif" font-size="12" fill="#66788a">Bars use a compressed visual scale; numeric labels are authoritative.</text>
  <text x="58" y="530" font-family="sans-serif" font-size="20" font-weight="700" fill="#18212b">B. Adaptive-importance ESS after 20,000 proposals</text>
