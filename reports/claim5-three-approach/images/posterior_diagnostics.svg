  <text x="60" y="590" font-family="sans-serif" font-size="15" fill="#273444">EPL+3</text><rect x="250" y="574" width="9" height="18" fill="#c53030"/><text x="267" y="589" font-family="sans-serif" font-size="14" fill="#273444">10.26 / 20,000</text>
  <text x="60" y="620" font-family="sans-serif" font-size="15" fill="#273444">SIE+3</text><rect x="250" y="604" width="3" height="18" fill="#c53030"/><text x="261" y="619" font-family="sans-serif" font-size="14" fill="#273444">1.77 / 20,000</text>
