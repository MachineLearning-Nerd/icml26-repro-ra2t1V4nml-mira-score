  <rect x="58" y="650" width="1060" height="34" rx="8" fill="#fff5f5" stroke="#feb2b2"/>
  <text x="78" y="672" font-family="sans-serif" font-size="15" font-weight="700" fill="#9b2c2c">Result: all MIRA rankings from these profiles are rejected; Claim 5 remains BLOCKED.</text>
