<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Claim 5 release-completeness blockers</title>
  <desc id="desc">Six missing requirements prevent a faithful reproduction of the 13-dimensional lensing claim.</desc>
  <rect width="1200" height="675" rx="28" fill="#fffaf1"/>
  <text x="62" y="76" fill="#3e2a10" font-family="Arial,sans-serif" font-size="40" font-weight="700">Claim 5: blocked by evidence availability</text>
  <text x="62" y="115" fill="#7b6547" font-family="Arial,sans-serif" font-size="19">Pinned recursive audit: 116 Git-tree entries across both author repositories</text>
  <g font-family="Arial,sans-serif">
    <g transform="translate(62 157)"><rect width="337" height="150" rx="16" fill="#ffffff" stroke="#e7ceb0" stroke-width="2"/><circle cx="35" cy="37" r="17" fill="#d18a2b"/><text x="29" y="44" fill="#fff" font-size="22">×</text><text x="66" y="42" fill="#3e2a10" font-size="20" font-weight="700">Truth parameters</text><text x="28" y="82" fill="#7b6547" font-size="16">Missing L=100 vectors</text><text x="28" y="108" fill="#7b6547" font-size="16">at d=13</text></g>
    <g transform="translate(431 157)"><rect width="337" height="150" rx="16" fill="#ffffff" stroke="#e7ceb0" stroke-width="2"/><circle cx="35" cy="37" r="17" fill="#d18a2b"/><text x="29" y="44" fill="#fff" font-size="22">×</text><text x="66" y="42" fill="#3e2a10" font-size="20" font-weight="700">Posterior samples</text><text x="28" y="82" fill="#7b6547" font-size="16">Missing four sets of</text><text x="28" y="108" fill="#7b6547" font-size="16">100×20,000×13</text></g>
    <g transform="translate(800 157)"><rect width="337" height="150" rx="16" fill="#ffffff" stroke="#e7ceb0" stroke-width="2"/><circle cx="35" cy="37" r="17" fill="#d18a2b"/><text x="29" y="44" fill="#fff" font-size="22">×</text><text x="66" y="42" fill="#3e2a10" font-size="20" font-weight="700">MALA protocol</text><text x="28" y="82" fill="#7b6547" font-size="16">No sampler source, step size,</text><text x="28" y="108" fill="#7b6547" font-size="16">initialization, or tuning</text></g>
    <g transform="translate(62 337)"><rect width="337" height="150" rx="16" fill="#ffffff" stroke="#e7ceb0" stroke-width="2"/><circle cx="35" cy="37" r="17" fill="#d18a2b"/><text x="29" y="44" fill="#fff" font-size="22">×</text><text x="66" y="42" fill="#3e2a10" font-size="20" font-weight="700">Forward model code</text><text x="28" y="82" fill="#7b6547" font-size="16">No executable caustics</text><text x="28" y="108" fill="#7b6547" font-size="16">EPL/SIE–Sérsic construction</text></g>
    <g transform="translate(431 337)"><rect width="337" height="150" rx="16" fill="#ffffff" stroke="#e7ceb0" stroke-width="2"/><circle cx="35" cy="37" r="17" fill="#d18a2b"/><text x="29" y="44" fill="#fff" font-size="22">×</text><text x="66" y="42" fill="#3e2a10" font-size="20" font-weight="700">Fixed constants</text><text x="28" y="82" fill="#7b6547" font-size="16">Paper says “held constant”</text><text x="28" y="108" fill="#7b6547" font-size="16">without listing values</text></g>
    <g transform="translate(800 337)"><rect width="337" height="150" rx="16" fill="#ffffff" stroke="#e7ceb0" stroke-width="2"/><circle cx="35" cy="37" r="17" fill="#d18a2b"/><text x="29" y="44" fill="#fff" font-size="22">×</text><text x="66" y="42" fill="#3e2a10" font-size="20" font-weight="700">Versions and seeds</text><text x="28" y="82" fill="#7b6547" font-size="16">No caustics/MALA versions</text><text x="28" y="108" fill="#7b6547" font-size="16">or deterministic seeds</text></g>
  </g>
  <rect x="62" y="531" width="1075" height="94" rx="16" fill="#3e2a10"/>
  <text x="91" y="568" fill="#f5bd5c" font-family="Arial,sans-serif" font-size="21" font-weight="700">BLOCKED ≠ false</text>
  <text x="91" y="600" fill="#fff6e8" font-family="Arial,sans-serif" font-size="17">The hardcoded scores and aggregate TARP file cannot regenerate MIRA. A guessed 13.33 CPU-hour run would be a different experiment.</text>
</svg>
